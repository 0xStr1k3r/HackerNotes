<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Note — HackerNotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="assets/css/main.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <a class="header-logo" href="index.html">
      <span class="logo-symbol">&gt;_</span>
      <span>HackerNotes</span>
    </a>
    <div class="header-divider"></div>
    <nav class="header-nav" id="breadcrumb-nav"></nav>
    <div class="header-right">
      <div class="settings-wrapper">
        <button class="settings-btn" id="settings-btn" title="Settings &amp; Theme">⚙</button>
      </div>
      <a href="search.html" class="header-btn">Search</a>
    </div>
  </header>

  <div class="viewer-layout" id="viewer-layout">
    <!-- SIDEBAR PEEK BUTTON (shown when sidebar hidden) -->
    <button class="sidebar-peek-btn" id="sidebar-peek" title="Show sidebar">❯</button>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- SIDEBAR -->
    <aside class="viewer-sidebar" id="viewer-sidebar">
      <div class="sidebar-header">
        <span id="sidebar-path-name">Navigation</span>
        <button class="sidebar-close-btn" id="sidebar-close" title="Hide sidebar">✕</button>
      </div>
      <div class="sidebar-content" id="sidebar-content"></div>
    </aside>

    <!-- MAIN NOTE AREA -->
    <main class="viewer-main" id="viewer-main">
      <div id="loading-state" class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading note…</p>
      </div>
      <div id="note-wrap" class="note-wrap" hidden>
        <article class="markdown-content" id="note-body"></article>
        <div class="note-nav" id="note-nav"></div>
      </div>
      <div id="error-state" class="error-state" hidden>
        <p class="error-title">Note not found</p>
        <a href="index.html">← Go home</a>
      </div>
    </main>
  </div>

  <script src="data/navigation.json"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/markdown-loader.js"></script>
</body>
</html>
